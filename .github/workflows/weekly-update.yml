name: PCFL Build & Deploy (production + staging)

# One Pages deployment carries both environments:
#   production  <- main branch     -> https://pcfl2k.github.io/PCFL-Football/
#   staging     <- staging branch  -> https://pcfl2k.github.io/PCFL-Football/staging/
# Iterate on `staging`, verify at /staging/, then merge staging -> main to promote.

on:
  push:
    branches: [main, staging]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout production (main)
        uses: actions/checkout@v4
        with:
          ref: main
          path: prod

      - name: Checkout staging
        uses: actions/checkout@v4
        with:
          ref: staging
          path: staging

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh PCFL Network video feed
        continue-on-error: true
        run: |
          curl -sf "https://www.youtube.com/feeds/videos.xml?channel_id=UCCopjecFoHzlVp99e-3W2yA" -o feed.xml
          if [ -s feed.xml ]; then
            cp feed.xml prod/scripts/yt-feed.xml
            cp feed.xml staging/scripts/yt-feed.xml
          fi

      - name: Parse FBPro98 exports (production)
        run: node prod/scripts/parse-fbpro.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Parse FBPro98 exports (staging)
        run: node staging/scripts/parse-fbpro.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit regenerated production data
        if: github.ref == 'refs/heads/main'
        working-directory: prod
        run: |
          git config user.name "pcfl-bot"
          git config user.email "actions@github.com"
          git add data scripts/yt-feed.xml
          git diff --cached --quiet || git commit -m "data: regenerate weekly JSON [bot]"
          git push

      - name: Assemble combined site (prod at root, staging under /staging/)
        run: |
          mkdir site
          cp -r prod/. site/
          mkdir -p site/staging
          cp -r staging/. site/staging/
          rm -rf site/.git site/.github site/staging/.git site/staging/.github site/staging/drops
          touch site/.nojekyll

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
